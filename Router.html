<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <style>
    html,body{margin:0;height:100%;background:#241710;}
    .c{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#c9a86f;font-family:sans-serif;font-size:16px;}
  </style>
</head>
<body>
  <div class="c">喫茶Tamu を起動中…</div>
  <script>
    (function () {
      var base = <?!= JSON.stringify(execUrl) ?>;
      // 端末判定：横幅が広く（タブレット/PC）かつ横長 → 券売機(タブレット)版、それ以外 → スマホ版
      var w = window.innerWidth, h = window.innerHeight;
      var isTablet = (w >= 820) && (w >= h * 0.9);
      var view = isTablet ? 'tablet' : 'mobile';
      var sep = base.indexOf('?') >= 0 ? '&' : '?';
      window.top.location.replace(base + sep + 'view=' + view);
    })();
  </script>
</body>
</html>
