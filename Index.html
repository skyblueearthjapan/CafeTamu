<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  <style>html,body{margin:0;height:100%;background:#f3e8d2;}</style>
  <script>window.TAMU_PORTAL_URL = <?!= JSON.stringify(portalUrl) ?>;</script>
  <?!= include('Logo'); ?>
</head>
<body>
  <!-- レトロ喫茶アイコン（スプライト。ライブDOMに常駐し <use> で参照） -->
  <?!= include('Icons'); ?>

  <!-- 描画先 -->
  <div id="root"></div>

  <!-- 各ビューの CSS＋マークアップ（不活性テンプレート。判定後に1つだけ注入） -->
  <script type="text/html" id="tpl-mobile"><?!= include('Css'); ?>
<?!= include('AppMobile'); ?></script>
  <script type="text/html" id="tpl-tablet"><?!= include('CssTablet'); ?>
<?!= include('AppTablet'); ?></script>

  <!-- コントローラ（window.initTamuMobile / window.initTamuTablet を定義。自動実行しない） -->
  <?!= include('Js'); ?>
  <?!= include('JsTablet'); ?>

  <!-- 端末判定 → ビュー注入 → 初期化（リダイレクトしないので GAS サンドボックスでも安全） -->
  <script>
    (function () {
      var forced = <?!= JSON.stringify(forcedView) ?>;
      var view;
      if (forced === 'tablet' || forced === 'mobile') {
        view = forced;
      } else {
        // GAS のサンドボックス iframe 内では <meta viewport> が無視され、
        // window.innerWidth が端末実幅ではなく iframe 幅（PC相当）を返すことがある。
        // そのため UA と screen.width も併用して堅牢に判定する。
        var ua = navigator.userAgent || '';
        var isMobileUA = /Android|iPhone|iPod|IEMobile|BlackBerry|Opera Mini|Mobile/i.test(ua);
        var widths = [];
        if (window.innerWidth) widths.push(window.innerWidth);
        if (window.screen && window.screen.width) widths.push(window.screen.width);
        var eff = widths.length ? Math.min.apply(null, widths) : 0;
        // モバイル端末、または有効幅が狭い → スマホ版。広い画面(タブレット/PC) → 券売機版。
        view = (isMobileUA || (eff && eff < 820)) ? 'mobile' : 'tablet';
      }
      var tpl = document.getElementById('tpl-' + view);
      document.getElementById('root').innerHTML = tpl.innerHTML;
      (view === 'tablet' ? window.initTamuTablet : window.initTamuMobile)();
    })();
  </script>
</body>
</html>
