<script>
(function () {
  'use strict';

  // ===== google.script.run の Promise ラッパ =====
  function call(fn, args) {
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.ok === false) reject(new Error(res.message || res.code || 'error'));
          else resolve(res && res.ok ? res.data : res);
        })
        .withFailureHandler(function (err) { reject(err); })
        [fn].apply(google.script.run, args || []);
    });
  }

  // ===== 状態 =====
  var S = {
    depts: [], staff: [], staffByCode: {},
    prices: { coffee: 20 },
    depositOptions: [100, 500, 1000],
    q: '', dept: 'すべて',
    selectedCode: null,
    adminTab: 'staff', monthDetail: null,
    admin: null,
    busy: false,
  };

  var el = function (id) { return document.getElementById(id); };

  // ===== 金額フォーマット（デザイン準拠：−／＋／¥） =====
  function yen(n) { var s = '¥' + Math.abs(n).toLocaleString('ja-JP'); return n < 0 ? '−' + s : s; }
  function signed(n) { var s = '¥' + Math.abs(n).toLocaleString('ja-JP'); if (n < 0) return '−' + s; if (n > 0) return '＋' + s; return s; }
  function tone(n) { return n < 0 ? '#b23a2e' : '#2f6b4a'; }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  // ===== 画面遷移 =====
  function show(screen) {
    ['home', 'count', 'admin'].forEach(function (s) {
      el('screen-' + s).classList.toggle('active', s === screen);
    });
  }

  function toast(msg) {
    var t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    el('app').appendChild(t);
    setTimeout(function () { t.remove(); }, 2600);
  }

  // ===== HOME =====
  function renderChips() {
    // スマホ版は部署をプルダウンで選択（部署数が多いため）
    var all = ['すべて'].concat(S.depts);
    el('dept-select').innerHTML = all.map(function (d) {
      return '<option value="' + escapeHtml(d) + '"' + (S.dept === d ? ' selected' : '') + '>' + escapeHtml(d) + '</option>';
    }).join('');
  }

  function filteredStaff() {
    var q = S.q.trim();
    return S.staff.filter(function (s) {
      if (S.dept !== 'すべて' && s.dept !== S.dept) return false;
      if (q && s.name.indexOf(q) < 0 && s.dept.indexOf(q) < 0) return false;
      return true;
    });
  }

  function renderStaffList() {
    var list = filteredStaff();
    if (!list.length) {
      el('staff-list').innerHTML = '<div class="empty cursive">該当する方がいません</div>';
      return;
    }
    el('staff-list').innerHTML = list.map(function (s) {
      var neg = s.balance < 0 ? ' neg' : '';
      return '<button class="staff-card' + neg + '" data-code="' + escapeHtml(s.code) + '">' +
        '<div style="display:flex; flex-direction:column; gap:3px;">' +
          '<span style="font-size:12px; color:#9c8055;">' + escapeHtml(s.dept) + '</span>' +
          '<span class="serif" style="font-weight:700; font-size:20px; color:#33271b;">' + escapeHtml(s.name) + '</span>' +
        '</div>' +
        '<div style="display:flex; flex-direction:column; align-items:flex-end;">' +
          '<span style="font-size:11px; color:#9c8055;">残高</span>' +
          '<span class="serif" style="font-weight:700; font-size:20px; color:' + tone(s.balance) + ';">' + yen(s.balance) + '</span>' +
        '</div>' +
      '</button>';
    }).join('');
  }

  // ===== COUNT =====
  function curStaff() { return S.staffByCode[S.selectedCode]; }

  function renderCount() {
    var c = curStaff();
    if (!c) return;
    el('count-name').textContent = c.name;
    el('count-dept').textContent = c.dept;
    el('led-today').textContent = c.today || 0;
    el('led-month').textContent = c.month || 0;
    var neg = c.balance < 0;
    var ledBal = el('led-balance');
    ledBal.textContent = yen(c.balance);
    ledBal.style.color = neg ? '#ff6b5a' : '#ffc24d';
    ledBal.style.textShadow = '0 0 14px ' + (neg ? '#ff6b5a99' : '#ffc24d88');
    el('neg-warn').style.display = neg ? '' : 'none';
    renderHistory(c.history || []);
  }

  function renderHistory(history) {
    var box = el('hist-list');
    if (!history.length) { box.innerHTML = '<span style="color:#b09a76; font-size:13px;">まだ利用がありません</span>'; return; }
    box.innerHTML = history.map(function (h) {
      return '<div class="hist-row">' +
        '<div style="display:flex; flex-direction:column;">' +
          '<span style="font-size:14px; color:#33271b;">' + escapeHtml(h.label) + '</span>' +
          '<span style="font-size:11px; color:#b09a76;">' + escapeHtml(h.time) + '</span>' +
        '</div>' +
        '<div style="display:flex; align-items:center; gap:10px;">' +
          '<span class="amt" style="color:' + tone(h.amount) + ';">' + signed(h.amount) + '</span>' +
          '<button class="btn-undo" data-undo="' + escapeHtml(h.id) + '">取消</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderCoins() {
    el('coin-grid').innerHTML = S.depositOptions.map(function (a) {
      return '<button class="btn-coin" data-coin="' + a + '">＋¥' + a.toLocaleString('ja-JP') + '</button>';
    }).join('');
  }

  // 取引後にサーバの確定状態でローカルを更新
  function applyState(st) {
    var c = S.staffByCode[st.code];
    if (!c) return;
    c.balance = st.balance; c.today = st.today; c.month = st.month;
    if (st.history) c.history = st.history;
    if (S.selectedCode === st.code) renderCount();
  }

  // ===== 「ピッ」スタンプ演出 =====
  function pip(opts, targetEl) {
    var app = el('app');
    var ar = app.getBoundingClientRect();
    var x = ar.width / 2, y = ar.height / 2;
    if (targetEl) {
      var br = targetEl.getBoundingClientRect();
      x = br.left + br.width / 2 - ar.left;
      y = br.top + br.height / 2 - ar.top;
    }
    var old = el('pip'); if (old) old.remove();
    var soundSize = opts.sound.length > 3 ? 22 : 34;
    var wrap = document.createElement('div');
    wrap.id = 'pip';
    wrap.style.left = x + 'px'; wrap.style.top = y + 'px';
    wrap.style.animation = 'tamuPip 1000ms cubic-bezier(.2,.8,.2,1) forwards';
    wrap.innerHTML =
      '<div class="ring" style="border-color:' + opts.accent + ';"></div>' +
      '<div class="stamp" style="border-color:' + opts.accent + ';">' +
        '<div class="snd" style="font-size:' + soundSize + 'px; color:' + opts.accent + ';">' + escapeHtml(opts.sound) + '</div>' +
        '<div class="lbl">' + escapeHtml(opts.label) + '</div>' +
        '<div class="sub" style="color:' + opts.accent + ';">' + escapeHtml(opts.sub) + '</div>' +
      '</div>';
    app.appendChild(wrap);
    clearTimeout(pip._t);
    pip._t = setTimeout(function () { if (el('pip')) el('pip').remove(); }, 1000);
  }

  // ===== 操作（楽観更新 → サーバ確定で再同期） =====
  function buy(kind, btn) {
    var c = curStaff(); if (!c || S.busy) return;
    var amt = -S.prices[kind];
    var label = 'コーヒー';
    var isDrink = true;
    // 楽観更新
    c.balance += amt; if (isDrink) { c.today += 1; c.month += 1; }
    renderCount();
    pip({ sound: 'ピッ', label: label, sub: signed(amt), accent: '#b9772e' }, btn);
    S.busy = true;
    call('recordUsage', [c.code, kind]).then(function (st) { applyState(st); }).catch(function (e) {
      toast('記録に失敗しました: ' + e.message); refreshStaff(c.code);
    }).then(function () { S.busy = false; });
  }

  function deposit(amount, btn) {
    var c = curStaff(); if (!c || S.busy) return;
    c.balance += amount;
    renderCount();
    pip({ sound: 'チャリーン', label: '入金', sub: signed(amount), accent: '#c9a25a' }, btn);
    S.busy = true;
    call('recordDeposit', [c.code, amount]).then(function (st) { applyState(st); }).catch(function (e) {
      toast('入金に失敗しました: ' + e.message); refreshStaff(c.code);
    }).then(function () { S.busy = false; });
  }

  function undo(txId, btn) {
    var c = curStaff(); if (!c || S.busy) return;
    S.busy = true;
    pip({ sound: 'とりけし', label: '取消', sub: '', accent: '#8a7458' }, btn);
    call('undoEntry', [c.code, txId]).then(function (st) { applyState(st); }).catch(function (e) {
      toast('取消に失敗しました: ' + e.message);
    }).then(function () { S.busy = false; });
  }

  function refreshStaff(code) {
    call('getStaffState', [code]).then(function (st) { applyState(st); }).catch(function () {});
  }

  function openStaff(code) {
    S.selectedCode = code;
    var c = S.staffByCode[code];
    if (c) { c.history = c.history || []; }
    renderCount();
    show('count');
    refreshStaff(code); // 最新残高＋履歴を取得
  }

  // ===== ADMIN =====
  function openAdmin() {
    show('admin');
    S.adminTab = 'staff'; S.monthDetail = null;
    setTab('staff');
    el('summary').innerHTML = '<div class="empty">集計中…</div>';
    call('getAdmin', []).then(function (a) { S.admin = a; renderAdmin(); }).catch(function (e) { toast('集計に失敗: ' + e.message); });
  }

  function renderAdmin() {
    var a = S.admin; if (!a) return;
    var s = a.summary;
    var stats = [
      { l: '登録', v: s.total + '名', t: '#33271b' },
      { l: '本日', v: s.todayTotal + '杯', t: '#5a3a1c' },
      { l: '今月', v: s.monthTotal + '杯', t: '#5a3a1c' },
      { l: 'マイナス', v: s.negCount + '名', t: s.negCount ? '#b23a2e' : '#2f6b4a' },
      { l: '預り残高', v: yen(s.sumBal), t: '#1f3b2e' },
      { l: '平均', v: yen(s.avg), t: '#1f3b2e' },
    ];
    el('summary').innerHTML = stats.map(function (m) {
      return '<div class="stat"><div class="l">' + escapeHtml(m.l) + '</div><div class="v" style="color:' + m.t + ';">' + escapeHtml(m.v) + '</div></div>';
    }).join('');

    el('staff-rows').innerHTML = a.rows.map(function (r) {
      var neg = r.balance < 0 ? ' neg' : '';
      return '<div class="arow' + neg + '">' +
        '<div style="display:flex; flex-direction:column;">' +
          '<span class="serif" style="font-weight:600; font-size:17px; color:#33271b;">' + escapeHtml(r.name) + '</span>' +
          '<span style="font-size:12px; color:#9c8055;">' + escapeHtml(r.dept) + ' ・ 今月' + r.month + '杯</span>' +
        '</div>' +
        '<span class="amt" style="color:' + tone(r.balance) + ';">' + yen(r.balance) + '</span>' +
      '</div>';
    }).join('');

    var maxCups = a.monthly.reduce(function (m, x) { return Math.max(m, x.cups); }, 0) || 1;
    el('monthly-rows').innerHTML = a.monthly.length ? a.monthly.map(function (x) {
      var w = Math.round(x.cups / maxCups * 100);
      return '<div class="mrow" data-month="' + escapeHtml(x.key) + '">' +
        '<div class="head">' +
          '<span class="serif" style="font-weight:700; font-size:19px; color:#1f3b2e;">' + escapeHtml(x.label) + '</span>' +
          '<span style="font-size:13px; color:#7a6a55;">' + x.cups + '杯 ・ <span class="serif" style="font-weight:700; color:#1f3b2e;">' + yen(x.spend) + '</span> <span style="color:#b9772e;">›</span></span>' +
        '</div>' +
        '<div class="bar"><div style="width:' + w + '%;"></div></div>' +
      '</div>';
    }).join('') : '<div class="empty">まだ利用データがありません</div>';
  }

  function setTab(tab) {
    S.adminTab = tab; S.monthDetail = null;
    document.querySelectorAll('.tab').forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-tab') === tab); });
    el('tab-staff').style.display = tab === 'staff' ? '' : 'none';
    el('tab-month').style.display = tab === 'month' ? '' : 'none';
    el('month-list').style.display = ''; el('month-detail').style.display = 'none';
  }

  function openMonth(key, label) {
    el('month-list').style.display = 'none';
    el('month-detail').style.display = '';
    el('detail-title').textContent = label + ' の内訳';
    el('detail-rows').innerHTML = '<div class="empty">読み込み中…</div>';
    call('getMonthDetail', [key]).then(function (d) {
      el('detail-rows').innerHTML = d.rows.length ? d.rows.map(function (r) {
        return '<div class="arow">' +
          '<div style="display:flex; flex-direction:column;">' +
            '<span class="serif" style="font-weight:600; font-size:16px; color:#33271b;">' + escapeHtml(r.name) + '</span>' +
            '<span style="font-size:11px; color:#9c8055;">コーヒー ' + r.coffee + '・お茶 ' + r.tea + '</span>' +
          '</div>' +
          '<div style="display:flex; flex-direction:column; align-items:flex-end;">' +
            '<span class="serif" style="font-weight:700; font-size:16px; color:#33271b;">' + r.cups + '杯</span>' +
            '<span style="font-size:12px; color:#1f3b2e;">' + yen(r.spend) + '</span>' +
          '</div>' +
        '</div>';
      }).join('') : '<div class="empty">この月の利用はありません</div>';
    }).catch(function (e) { el('detail-rows').innerHTML = '<div class="empty">取得に失敗しました</div>'; });
  }

  // ===== イベント =====
  function wire() {
    el('logo-home').src = window.TAMU_LOGO_SRC || '';
    var portal = el('btn-portal'); if (portal) portal.href = window.TAMU_PORTAL_URL || '#';

    el('search').addEventListener('input', function (e) { S.q = e.target.value; renderStaffList(); });
    el('btn-admin').addEventListener('click', openAdmin);

    el('dept-select').addEventListener('change', function (e) {
      S.dept = e.target.value; renderStaffList();
    });
    el('staff-list').addEventListener('click', function (e) {
      var b = e.target.closest('[data-code]'); if (!b) return;
      openStaff(b.getAttribute('data-code'));
    });

    document.querySelectorAll('[data-go="home"]').forEach(function (b) {
      b.addEventListener('click', function () { S.selectedCode = null; show('home'); });
    });

    // カウント画面（委譲）
    el('screen-count').addEventListener('click', function (e) {
      var buyBtn = e.target.closest('[data-buy]');
      if (buyBtn) { buy(buyBtn.getAttribute('data-buy'), buyBtn); return; }
      var coinBtn = e.target.closest('[data-coin]');
      if (coinBtn) { deposit(Number(coinBtn.getAttribute('data-coin')), coinBtn); return; }
      var undoBtn = e.target.closest('[data-undo]');
      if (undoBtn) { undo(undoBtn.getAttribute('data-undo'), undoBtn); return; }
    });

    // 管理タブ
    document.querySelectorAll('.tab').forEach(function (b) {
      b.addEventListener('click', function () { setTab(b.getAttribute('data-tab')); });
    });
    el('monthly-rows').addEventListener('click', function (e) {
      var m = e.target.closest('[data-month]'); if (!m) return;
      var key = m.getAttribute('data-month');
      var row = S.admin.monthly.filter(function (x) { return x.key === key; })[0];
      openMonth(key, row ? row.label : key);
    });
    el('month-back').addEventListener('click', function () {
      el('month-list').style.display = ''; el('month-detail').style.display = 'none';
    });
  }

  // ===== 起動 =====
  function init() {
    wire();
    call('getInit', []).then(function (data) {
      S.depts = data.depts || [];
      S.staff = data.staff || [];
      S.prices = data.prices || S.prices;
      S.depositOptions = data.depositOptions || S.depositOptions;
      S.staffByCode = {};
      S.staff.forEach(function (s) { s.history = []; S.staffByCode[s.code] = s; });
      el('price-coffee').textContent = S.prices.coffee;
      renderChips(); renderStaffList(); renderCoins();
      el('loading').style.display = 'none';
    }).catch(function (e) {
      el('loading').innerHTML = '初期化に失敗しました。<br>マスタ同期（setup）を実行してください。<br><small>' + escapeHtml(e.message) + '</small>';
    });
  }

  // ブートストラップ（Index.html）が端末判定後にビューを注入してから呼ぶ
  window.initTamuMobile = init;
})();
</script>
